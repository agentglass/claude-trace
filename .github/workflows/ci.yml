name: CI

on:
  push:
    branches: [main, "milestone-*", "feat/*", "fix/*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Rust: clippy, fmt, test (matrix: Linux/macOS/Windows × stable MSRV 1.75)
  # ────────────────────────────────────────────────────────────────────────────
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (MSRV 1.75)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.75"
          components: clippy, rustfmt

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (pedantic, all features)
        run: |
          cargo clippy \
            --all-targets \
            --all-features \
            -- \
            -D warnings \
            -D clippy::pedantic \
            -A clippy::module_name_repetitions

      - name: cargo test (all features)
        run: cargo test --all-features

      - name: cargo doc (verify docs compile)
        run: cargo doc --all-features --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  # ────────────────────────────────────────────────────────────────────────────
  # Rust coverage gate: 85% minimum (Linux only, on PRs)
  # ────────────────────────────────────────────────────────────────────────────
  rust-coverage:
    name: Rust Coverage Gate (85%)
    runs-on: ubuntu-latest
    needs: rust
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-cov-${{ hashFiles('**/Cargo.toml') }}

      - name: Run coverage and enforce gate
        run: |
          cargo llvm-cov \
            --all-features \
            --summary-only \
            2>&1 | tee coverage-summary.txt

          COVERAGE=$(grep -oE "[0-9]+\.[0-9]+%" coverage-summary.txt | head -1 | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          awk -v cov="${COVERAGE}" 'BEGIN {
            if (cov + 0 < 85.0) {
              printf "FAIL: Coverage %.1f%% is below required 85%%\n", cov
              exit 1
            } else {
              printf "PASS: Coverage %.1f%% meets the 85%% minimum gate\n", cov
            }
          }'

  # ────────────────────────────────────────────────────────────────────────────
  # Python: ruff lint + format, mypy, pytest
  # Matrix: Python 3.11 / 3.12 / 3.13
  # ────────────────────────────────────────────────────────────────────────────
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust (for maturin build)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.75"

      - name: Install Python dev dependencies
        run: |
          pip install --upgrade pip
          pip install maturin
          pip install -e ".[dev]"

      - name: ruff check (lint)
        run: ruff check src/ python/

      - name: ruff format --check
        run: ruff format --check src/ python/

      - name: Build Rust extension (maturin develop)
        run: maturin develop --features python
        # Skip gracefully if PyO3 bindings haven't been written yet (Milestone 1)
        continue-on-error: ${{ !hashFiles('src/python_bindings/**') }}

      - name: mypy type check
        run: mypy python/claude_trace/ --ignore-missing-imports

      - name: pytest
        run: |
          pytest python/tests/ \
            -v \
            --tb=short \
            --strict-markers \
            -x

  # ────────────────────────────────────────────────────────────────────────────
  # TypeScript: tsc type check, jest tests
  # ────────────────────────────────────────────────────────────────────────────
  typescript:
    name: TypeScript / WASM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install Rust (for wasm-pack)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.75"
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install npm dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit -p typescript/tsconfig.json
        continue-on-error: ${{ !hashFiles('typescript/pkg/*.d.ts') }}

      - name: Build WASM package (nodejs target)
        run: wasm-pack build --target nodejs --out-dir typescript/pkg
        continue-on-error: ${{ !hashFiles('src/wasm_bindings/**') }}

      - name: Run Jest tests
        run: npm test -- --config typescript/jest.config.js
        continue-on-error: ${{ !hashFiles('typescript/tests/**') }}

  # ────────────────────────────────────────────────────────────────────────────
  # Semconv backwards compatibility check
  # ────────────────────────────────────────────────────────────────────────────
  semconv-compat:
    name: Semconv Backwards Compatibility
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check semconv compatibility
        run: |
          if [[ -f "scripts/check_semconv_compat.py" ]]; then
            python scripts/check_semconv_compat.py
          else
            echo "check_semconv_compat.py not yet present (created in Milestone 2) — skipping"
          fi

  # ────────────────────────────────────────────────────────────────────────────
  # Docs site build
  # ────────────────────────────────────────────────────────────────────────────
  docs-build:
    name: Docs Site Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check if site directory exists
        id: site-check
        run: |
          if [[ -f "site/package.json" ]]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "site/package.json not found (created in Milestone 5) — skipping"
          fi

      - name: Install site dependencies
        if: steps.site-check.outputs.exists == 'true'
        run: npm ci --prefix site

      - name: Build Starlight docs site
        if: steps.site-check.outputs.exists == 'true'
        run: npm run build --prefix site

      - name: Deploy to Netlify (main branch only)
        if: >
          steps.site-check.outputs.exists == 'true' &&
          github.ref == 'refs/heads/main' &&
          github.event_name == 'push'
        uses: nwtgck/actions-netlify@v2
        with:
          publish-dir: site/dist
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from CI — ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        continue-on-error: true

  # ────────────────────────────────────────────────────────────────────────────
  # Required status check for branch protection rules
  # ────────────────────────────────────────────────────────────────────────────
  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [rust, python, typescript, semconv-compat, docs-build]
    if: always()
    steps:
      - name: Verify all required jobs succeeded
        run: |
          RUST="${{ needs.rust.result }}"
          PYTHON="${{ needs.python.result }}"

          if [[ "${RUST}" != "success" ]]; then
            echo "Rust checks failed (result: ${RUST})"
            exit 1
          fi
          if [[ "${PYTHON}" != "success" ]]; then
            echo "Python checks failed (result: ${PYTHON})"
            exit 1
          fi
          echo "All required checks passed."
