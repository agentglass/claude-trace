name: Security Audit

on:
  schedule:
    # Run every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  pull_request:
    paths:
      # Trigger on any dependency file change
      - "Cargo.toml"
      - "Cargo.lock"
      - "pyproject.toml"
      - "package.json"
      - "package-lock.json"
      - "requirements*.txt"
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

permissions:
  contents: read
  security-events: write  # Required for uploading SARIF results

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Rust: cargo audit
  # ────────────────────────────────────────────────────────────────────────────
  rust-audit:
    name: cargo audit (Rust dependencies)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: |
          cargo audit \
            --deny warnings \
            --deny unmaintained \
            --deny unsound \
            --deny yanked \
            2>&1 | tee rust-audit.txt
        # Fail on any advisory level

      - name: Upload audit results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rust-audit-results
          path: rust-audit.txt

  # ────────────────────────────────────────────────────────────────────────────
  # Python: pip-audit
  # ────────────────────────────────────────────────────────────────────────────
  python-audit:
    name: pip-audit (Python dependencies)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          pip-audit \
            --requirement <(pip install -e ".[dev]" --dry-run 2>/dev/null | grep -v "^Collecting\|^  Downloading\|^Installing\|^Successfully" || echo "") \
            --format json \
            --output python-audit.json \
            2>&1 || true

          # Direct audit against installed packages is more reliable
          pip install -e ".[dev]" --quiet
          pip-audit \
            --format markdown \
            --output python-audit.md
          cat python-audit.md

          # Fail on CRITICAL or HIGH severity
          pip-audit \
            --severity critical \
            --severity high

      - name: Upload audit results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: python-audit-results
          path: |
            python-audit.json
            python-audit.md

  # ────────────────────────────────────────────────────────────────────────────
  # JavaScript/TypeScript: npm audit
  # ────────────────────────────────────────────────────────────────────────────
  npm-audit:
    name: npm audit (TypeScript/JavaScript dependencies)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: |
          npm audit \
            --audit-level=high \
            --json \
            2>&1 | tee npm-audit.json || NPM_EXIT=$?

          # Parse and display the results
          node -e "
          const fs = require('fs');
          try {
            const audit = JSON.parse(fs.readFileSync('npm-audit.json', 'utf8'));
            const { critical, high, moderate, low } = audit.metadata?.vulnerabilities || {};
            console.log('Vulnerabilities:');
            console.log('  critical:', critical || 0);
            console.log('  high:', high || 0);
            console.log('  moderate:', moderate || 0);
            console.log('  low:', low || 0);
          } catch (e) {
            // Output might not be JSON if there are no vulnerabilities
            console.log('npm audit completed');
          }
          "

          exit ${NPM_EXIT:-0}

      - name: Upload audit results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-results
          path: npm-audit.json

  # ────────────────────────────────────────────────────────────────────────────
  # Secrets scanning: check for hardcoded API keys
  # ────────────────────────────────────────────────────────────────────────────
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for secret scanning

      - name: Scan for Anthropic API key patterns
        run: |
          echo "Scanning for hardcoded sk-ant- patterns..."

          # Find sk-ant- patterns, excluding test files that assert redaction
          HITS=$(git grep -rn "sk-ant-" -- \
            ":(exclude)*.md" \
            ":(exclude)tests/**" \
            ":(exclude)python/tests/**" \
            ":(exclude)typescript/tests/**" \
            2>/dev/null || true)

          if [[ -n "${HITS}" ]]; then
            echo "CRITICAL: Potential API key found in source:"
            echo "${HITS}"
            exit 1
          else
            echo "PASS: No hardcoded API key patterns found"
          fi

      - name: Check for other secret patterns
        run: |
          # Common secret patterns (conservative — avoids false positives)
          PATTERNS=(
            'password\s*=\s*"[^"]{8,}"'
            'secret\s*=\s*"[^"]{8,}"'
            'token\s*=\s*"[^"]{8,}"'
          )

          FOUND=0
          for PATTERN in "${PATTERNS[@]}"; do
            HITS=$(git grep -rniP "${PATTERN}" -- \
              ":(exclude)*.md" \
              ":(exclude)CHANGELOG.md" \
              ":(exclude)tests/**" \
              2>/dev/null || true)
            if [[ -n "${HITS}" ]]; then
              echo "WARNING: Potential secret pattern '${PATTERN}' found:"
              echo "${HITS}"
              FOUND=1
            fi
          done

          if [[ "${FOUND}" -ne 0 ]]; then
            echo ""
            echo "Review the above matches. If they are false positives (e.g., test fixtures),"
            echo "add them to the exclusion list in this workflow step."
            exit 1
          fi

          echo "PASS: No obvious secret patterns found"

  # ────────────────────────────────────────────────────────────────────────────
  # Summary: all security checks passed
  # ────────────────────────────────────────────────────────────────────────────
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [rust-audit, python-audit, npm-audit, secrets-scan]
    if: always()
    steps:
      - name: Report results
        run: |
          echo "=== Security Audit Summary ==="
          echo "cargo audit:  ${{ needs.rust-audit.result }}"
          echo "pip-audit:    ${{ needs.python-audit.result }}"
          echo "npm audit:    ${{ needs.npm-audit.result }}"
          echo "Secrets scan: ${{ needs.secrets-scan.result }}"
          echo ""

          FAILED=0
          for RESULT in \
            "${{ needs.rust-audit.result }}" \
            "${{ needs.python-audit.result }}" \
            "${{ needs.npm-audit.result }}" \
            "${{ needs.secrets-scan.result }}"; do
            if [[ "${RESULT}" == "failure" ]]; then
              FAILED=1
            fi
          done

          if [[ "${FAILED}" -ne 0 ]]; then
            echo "SECURITY AUDIT FAILED — see individual job logs above"
            exit 1
          else
            echo "All security checks passed."
          fi
